<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastKeno - Atlas V</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #13171a; --panel: #20262b; --green: #2ecc71; --hot: #ff4757; --cold: #2e86de; --btn-blue: #3498db; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header & Deposit */
        .top-bar { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #1a1f24; border-bottom: 1px solid #2c3238; }
        .deposit-btn { background: var(--btn-blue); color: white; padding: 6px 16px; border-radius: 4px; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        
        .header-ui { padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .id-badge { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 4px 15px; font-size: 11px; display: flex; gap: 8px; align-items: center; }

        /* Navigation Tabs (Always Visible) */
        .nav-tabs { display: flex; justify-content: space-around; border-top: 1px solid #2c3238; border-bottom: 1px solid #2c3238; padding: 12px 0; background: var(--bg); position: sticky; top: 0; z-index: 10; }
        .tab-link { font-size: 13px; font-weight: bold; color: #95a5a6; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .tab-link.active { color: var(--green); border-bottom: 2px solid var(--green); padding-bottom: 2px; }

        /* Keno Grid */
        .keno-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 10px; }
        .num-cell { background: #2c3238; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: bold; font-size: 14px; color: #95a5a6; position: relative; }
        .num-cell.selected { background: var(--green); color: black; }
        .num-cell.hot::after { content: ''; position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; background: var(--hot); border-radius: 50%; }
        .num-cell.cold::after { content: ''; position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; background: var(--cold); border-radius: 50%; }

        /* Betting Controls */
        .bet-area { background: var(--panel); margin: 0 10px; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
        .ctrl-btn { background: #2c3238; width: 48px; height: 42px; border-radius: 4px; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; border: none; color: white; }
        .bet-main-btn { background: #2d4a3a; width: calc(100% - 20px); margin: 10px auto; padding: 18px; border-radius: 4px; color: #ffffff; font-size: 26px; font-weight: 900; text-align: center; border: none; text-transform: uppercase; }

        /* Drawing UI */
        .draw-panel { text-align: center; padding: 20px 10px; }
        .draw-ball-main { width: 90px; height: 90px; background: radial-gradient(circle at 30% 30%, #34495e, #1a252f); border: 4px solid #5d6d7e; border-radius: 50%; margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .draw-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; padding: 15px; }
        .small-ball { width: 32px; height: 32px; background: #2c3e50; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border: 1px solid #5d6d7e; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center font-bold">⚡</div>
            <span class="font-bold text-sm tracking-tight">FAST KENO</span>
        </div>
        <button class="deposit-btn"><span>+</span> Deposit</button>
    </div>

    <div class="header-ui">
        <div id="timer" class="text-3xl font-mono text-white">00:60</div>
        <div class="id-badge">
            <span class="text-yellow-500 font-bold">0 ETB</span>
            <span class="opacity-40">ID: 877462616</span>
            <span class="text-green-500">✔</span>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="tab-link active" id="tab-game-link" onclick="switchTab('game')">▶ Game</div>
        <div class="tab-link" onclick="switchTab('history')">↺ History</div>
        <div class="tab-link" onclick="switchTab('results')">✔ Results</div>
        <div class="tab-link" onclick="switchTab('stats')">📊 Statistics</div>
    </div>

    <div id="game-view">
        <div id="keno-grid" class="keno-grid"></div>

        <div class="bet-area">
            <button class="ctrl-btn" onclick="updateBet(-2)">-</button>
            <div class="flex-grow text-center text-2xl font-bold"><span id="display-bet">2</span></div>
            <button class="ctrl-btn" onclick="updateBet(2)">+</button>
            <button class="text-green-500 font-bold px-2" onclick="updateBet('x2')">X2</button>
            <button class="text-green-500 font-bold px-2" onclick="updateBet('max')">MAX</button>
        </div>
        <button class="bet-main-btn">BET</button>
    </div>

    <div id="draw-view" class="hidden draw-panel">
        <div class="draw-ball-main" id="current-ball">--</div>
        <div id="draw-history" class="draw-grid"></div>
        
        <div class="mt-10 opacity-30">
            <div class="text-green-500 text-4xl mb-2">✔</div>
            <h2 class="text-xl font-bold">FAIRNESS</h2>
            <p class="text-[8px] tracking-[4px] uppercase">Atlas-V Gaming</p>
        </div>
    </div>

    <script>
        let bet = 2;
        let timerVal = 60;
        const grid = document.getElementById('keno-grid');

        // Initialize Grid
        for(let i=1; i<=80; i++) {
            const cell = document.createElement('div');
            cell.className = 'num-cell';
            cell.innerText = i;
            if([3, 11, 23, 30, 53, 78].includes(i)) cell.classList.add(i % 2 === 0 ? 'cold' : 'hot');
            cell.onclick = () => cell.classList.toggle('selected');
            grid.appendChild(cell);
        }

        function updateBet(val) {
            if(val === 'x2') bet *= 2;
            else if(val === 'max') bet = 1000;
            else bet += val;
            if(bet < 2) bet = 2;
            if(bet > 1000) bet = 1000;
            document.getElementById('display-bet').innerText = bet;
        }

        function switchTab(type) {
            // Placeholder logic for tabs - Navigation is always visible now
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // SLOW DRAW LOGIC
        function startDrawingPhase() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('draw-view').classList.remove('hidden');
            
            let count = 0;
            const drawInterval = setInterval(() => {
                const num = Math.floor(Math.random() * 80) + 1;
                document.getElementById('current-ball').innerText = num;
                
                const b = document.createElement('div');
                b.className = 'small-ball';
                b.innerText = num;
                document.getElementById('draw-history').appendChild(b);
                
                count++;
                if(count >= 20) {
                    clearInterval(drawInterval);
                    setTimeout(() => location.reload(), 8000); // Reset game
                }
            }, 1500); // 1.5 seconds per ball - Significantly Slower
        }

        const countdown = setInterval(() => {
            timerVal--;
            document.getElementById('timer').innerText = `00:${timerVal < 10 ? '0'+timerVal : timerVal}`;
            if(timerVal <= 0) {
                clearInterval(countdown);
                startDrawingPhase();
            }
        }, 1000);
    </script>
</body>
</html>
