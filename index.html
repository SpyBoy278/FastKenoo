<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastKeno - Atlas V</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg-main: #13171a; 
            --bg-card: #20262b; 
            --accent-green: #2ecc71; 
            --hot-red: #ff4757; 
            --cold-blue: #2e86de; 
        }
        body { background-color: var(--bg-main); color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Glass Header */
        .header-container { padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .id-pill { 
            background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; padding: 4px 12px; font-size: 11px; display: flex; align-items: center; gap: 8px;
        }

        /* Nav Bar */
        .nav-bar { display: flex; justify-content: space-around; border-top: 1px solid #2c3238; border-bottom: 1px solid #2c3238; padding: 10px 0; margin: 15px 0; }
        .nav-item { font-size: 14px; font-weight: bold; color: #9ba3a9; display: flex; align-items: center; gap: 5px; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: var(--accent-green); border-bottom: 2px solid var(--accent-green); padding-bottom: 2px; }

        /* Keno Grid */
        .keno-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 0 10px; }
        .num-box { background: #2c3238; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: 700; font-size: 14px; color: #9ba3a9; position: relative; }
        .num-box.selected { background: var(--accent-green); color: #13171a; }
        
        /* Drawing UI */
        .main-ball { width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #34495e, #1a252f); border: 4px solid #4a5d6e; border-radius: 50%; margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; }
        .ball-history { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; padding: 0 15px; }
        .history-item { width: 30px; height: 30px; background: #2c3e50; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 1px solid #4a5d6e; }

        /* Action Buttons */
        .btn-bet-main { background: linear-gradient(180deg, #3d5a4a 0%, #243b2f 100%); width: 95%; padding: 16px; border-radius: 5px; color: #8fa397; font-size: 22px; font-weight: 900; border: none; margin: 20px auto; display: block; }
        
        .hidden { display: none; }
        .hot::after { content: ''; position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; background: var(--hot-red); border-radius: 50%; }
        .cold::after { content: ''; position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; background: var(--cold-blue); border-radius: 50%; }
    </style>
</head>
<body>

    <div class="header-container">
        <div id="countdown" class="text-2xl font-mono">00:60</div>
        <div class="id-pill">
            <span class="text-yellow-500 font-bold">0 ETB</span>
            <span class="opacity-40">ID: 877462616</span>
            <span class="text-green-500">✔</span>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active">▶ Game</div>
        <div class="nav-item">↺ History</div>
        <div class="nav-item">✔ Results</div>
        <div class="nav-item">📊 Statistics</div>
    </div>

    <div id="game-view">
        <div class="text-center mb-4">
            <h2 class="text-lg font-bold">Choose 10 numbers</h2>
            <p class="text-green-500 text-xs">From 1 to 80</p>
        </div>
        <div id="grid-container" class="keno-grid"></div>
        <button class="btn-bet-main">BET</button>
    </div>

    <div id="draw-view" class="hidden text-center">
        <div class="main-ball" id="active-num">--</div>
        <div id="history-grid" class="ball-history mt-4"></div>
        <div class="mt-10 opacity-40">
            <div class="text-green-500 text-3xl mb-1">✔</div>
            <h2 class="text-xl font-bold">FAIRNESS</h2>
            <p class="text-[8px] tracking-[4px]">ATLAS-V GAMING</p>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid-container');
        const timerLabel = document.getElementById('countdown');
        let timeLeft = 60;

        // Init Grid
        for (let i = 1; i <= 80; i++) {
            const box = document.createElement('div');
            box.className = 'num-box';
            box.innerText = i;
            if ([3, 11, 30, 53].includes(i)) box.classList.add('hot');
            if ([5, 10, 23, 78].includes(i)) box.classList.add('cold');
            box.onclick = () => box.classList.toggle('selected');
            grid.appendChild(box);
        }

        // Timer Loop
        const gameLoop = setInterval(() => {
            timeLeft--;
            timerLabel.innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
            if (timeLeft <= 0) {
                clearInterval(gameLoop);
                startDrawing();
            }
        }, 1000);

        function startDrawing() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('draw-view').classList.remove('hidden');
            
            let count = 0;
            const drawInterval = setInterval(() => {
                const pick = Math.floor(Math.random() * 80) + 1;
                document.getElementById('active-num').innerText = pick;
                
                const b = document.createElement('div');
                b.className = 'history-item';
                b.innerText = pick;
                document.getElementById('history-grid').appendChild(b);
                
                count++;
                if (count >= 20) {
                    clearInterval(drawInterval);
                    // RETURN TO GAME: Wait 5 seconds to show results, then reload
                    setTimeout(() => location.reload(), 5000);
                }
            }, 400);
        }
    </script>
</body>
</html>
