<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastKeno - Atlas V</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-main: #13171a;
            --bg-panel: #20262b;
            --accent-green: #2ecc71;
            --hot-red: #ff4757;
            --cold-blue: #2e86de;
        }
        body { background-color: var(--bg-main); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* Header Glass Effect */
        .id-glass { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 4px 15px; font-size: 12px;
            display: flex; align-items: center; gap: 8px;
        }

        /* Number Grid */
        .num-cell { 
            background: #2c3238; aspect-ratio: 1/1; display: flex; 
            align-items: center; justify-content: center;
            border-radius: 4px; font-weight: bold; font-size: 14px; color: #95a5a6;
            position: relative; cursor: pointer;
        }
        .num-cell.selected { background: var(--accent-green); color: #000; }
        .num-cell.hot::after { content: ''; position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; background: var(--hot-red); border-radius: 50%; box-shadow: 0 0 5px var(--hot-red); }
        .num-cell.cold::after { content: ''; position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; background: var(--cold-blue); border-radius: 50%; }

        /* Drawing Animation */
        .draw-ball {
            width: 40px; height: 40px; background: radial-gradient(circle at 30% 30%, #5d6d7e, #2c3e50);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 2px solid #34495e; box-shadow: inset -3px -3px 5px rgba(0,0,0,0.5);
        }
        .main-ball {
            width: 80px; height: 80px; font-size: 32px; background: radial-gradient(circle at 30% 30%, #34495e, #1a252f);
            border: 4px solid #5d6d7e; margin: 20px auto;
        }

        .btn-bet { 
            background: linear-gradient(180deg, #3d5a4a 0%, #243b2f 100%);
            width: 100%; padding: 16px; border-radius: 5px; border: none;
            color: #8fa397; font-size: 22px; font-weight: 800;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="flex flex-col items-center gap-2 mb-4">
        <div id="timer" class="text-2xl font-mono text-white opacity-80">00:60</div>
        <div class="id-glass">
            <span class="text-yellow-500 font-bold">0 ETB</span>
            <span class="opacity-50">ID: 877462616</span>
            <span class="text-green-500">✔</span>
        </div>
    </div>

    <div id="betting-phase">
        <div class="text-center mb-4">
            <h1 class="text-xl font-bold">Choose 10 numbers</h1>
            <p class="text-green-500 text-sm">From 1 to 80</p>
        </div>

        <div id="keno-grid" class="grid grid-cols-10 gap-1.5 mb-6"></div>

        <div class="flex items-center gap-2 mb-4 bg-[#20262b] p-3 rounded-lg">
            <button class="bg-gray-700 w-10 h-10 rounded text-xl">-</button>
            <div class="flex-grow text-center text-xl font-bold">2</div>
            <button class="bg-gray-700 w-10 h-10 rounded text-xl">+</button>
            <button class="text-green-500 font-bold px-2">X2</button>
            <button class="text-green-500 font-bold px-2">MAX</button>
        </div>
        <button class="btn-bet">BET</button>
    </div>

    <div id="drawing-phase" class="hidden text-center">
        <div class="main-ball draw-ball" id="current-draw">--</div>
        <div id="results-grid" class="grid grid-cols-10 gap-2 mt-4"></div>
        <div class="mt-8">
            <div class="flex justify-center mb-4"><span class="text-green-500 text-4xl">✔</span></div>
            <h2 class="text-2xl font-bold mb-8">FAIRNESS</h2>
            <p class="opacity-30 text-xs">ATLAS-V GAMING</p>
        </div>
    </div>

    <script>
        const grid = document.getElementById('keno-grid');
        const resultsGrid = document.getElementById('results-grid');
        let timeLeft = 60;

        // 1. Generate the 1-80 Grid
        for (let i = 1; i <= 80; i++) {
            const cell = document.createElement('div');
            cell.className = 'num-cell';
            cell.innerText = i;
            if ([3, 11, 30, 53].includes(i)) cell.classList.add('hot');
            if ([5, 10, 23, 78].includes(i)) cell.classList.add('cold');
            
            cell.onclick = () => cell.classList.toggle('selected');
            grid.appendChild(cell);
        }

        // 2. Timer Logic
        const timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                startDrawing();
            }
        }, 1000);

        // 3. Drawing Phase Logic
        function startDrawing() {
            document.getElementById('betting-phase').classList.add('hidden');
            document.getElementById('drawing-phase').classList.remove('hidden');
            
            let drawnCount = 0;
            const drawNumbers = [];
            while(drawNumbers.length < 20) {
                let r = Math.floor(Math.random() * 80) + 1;
                if(!drawNumbers.includes(r)) drawNumbers.push(r);
            }

            const drawInterval = setInterval(() => {
                if (drawnCount < 20) {
                    const num = drawNumbers[drawnCount];
                    document.getElementById('current-draw').innerText = num;
                    
                    const ball = document.createElement('div');
                    ball.className = 'draw-ball text-xs h-8 w-8';
                    ball.innerText = num;
                    resultsGrid.appendChild(ball);
                    
                    drawnCount++;
                } else {
                    clearInterval(drawInterval);
                    setTimeout(() => location.reload(), 5000); // Reset game after 5s
                }
            }, 500); // Speed of balls appearing
        }
    </script>
</body>
            </html>
