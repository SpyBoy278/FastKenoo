<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastKeno - Atlas V</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #13171a; --panel: #20262b; --green: #2ecc71; --hot: #ff4757; --cold: #2e86de; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header Section */
        .header-ui { padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .id-badge { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 4px 15px; font-size: 11px; display: flex; gap: 8px; align-items: center; }

        /* Navigation Tabs */
        .nav-tabs { display: flex; justify-content: space-around; border-top: 1px solid #2c3238; border-bottom: 1px solid #2c3238; padding: 12px 0; margin-top: 10px; }
        .tab-link { font-size: 13px; font-weight: bold; color: #95a5a6; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .tab-link.active { color: var(--green); border-bottom: 2px solid var(--green); padding-bottom: 2px; }

        /* Keno Grid */
        .keno-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 10px; }
        .num-cell { background: #2c3238; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: bold; font-size: 14px; color: #95a5a6; position: relative; }
        .num-cell.selected { background: var(--green); color: black; }
        .num-cell.hot::after { content: ''; position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; background: var(--hot); border-radius: 50%; }
        .num-cell.cold::after { content: ''; position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; background: var(--cold); border-radius: 50%; }

        /* Betting Controls */
        .bet-area { background: var(--panel); margin: 0 10px; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
        .ctrl-btn { background: #2c3238; width: 48px; height: 42px; border-radius: 4px; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .bet-main-btn { background: #2d4a3a; width: calc(100% - 20px); margin: 10px auto; padding: 18px; border-radius: 4px; color: #ffffff; font-size: 26px; font-weight: 900; text-align: center; border: none; text-transform: uppercase; }

        /* Drawing Animation UI */
        .draw-ball-main { width: 85px; height: 85px; background: radial-gradient(circle at 30% 30%, #34495e, #1a252f); border: 4px solid #5d6d7e; border-radius: 50%; margin: 15px auto; display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: bold; }
        .small-ball { width: 32px; height: 32px; background: #2c3e50; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border: 1px solid #5d6d7e; }

        /* Tab Content Containers */
        .tab-content { padding: 15px; }
        .hidden { display: none; }
        
        /* Stats Styling */
        .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 14px; }
        .stat-bar { height: 6px; background: var(--green); border-radius: 3px; flex-grow: 1; }
    </style>
</head>
<body>

    <div class="header-ui">
        <div id="timer" class="text-3xl font-mono text-white">00:60</div>
        <div class="id-badge">
            <span class="text-yellow-500 font-bold">0 ETB</span>
            <span class="opacity-40">ID: 877462616</span>
            <span class="text-green-500">✔</span>
        </div>
    </div>

    <div id="game-container">
        <div id="keno-grid" class="keno-grid"></div>

        <div class="bet-area">
            <button class="ctrl-btn" onclick="updateBet(-2)">-</button>
            <div class="flex-grow text-center text-2xl font-bold"><span id="display-bet">2</span></div>
            <button class="ctrl-btn" onclick="updateBet(2)">+</button>
            <button class="text-green-500 font-bold px-2" onclick="updateBet('x2')">X2</button>
            <button class="text-green-500 font-bold px-2" onclick="updateBet('max')">MAX</button>
        </div>

        <button class="bet-main-btn">BET</button>

        <div class="nav-tabs">
            <div class="tab-link active" onclick="switchTab(event, 'game-info')">▶ Game</div>
            <div class="tab-link" onclick="switchTab(event, 'history-info')">↺ History</div>
            <div class="tab-link" onclick="switchTab(event, 'results-info')">✔ Results</div>
            <div class="tab-link" onclick="switchTab(event, 'stats-info')">📊 Statistics</div>
        </div>

        <div id="game-info" class="tab-content">
            <div class="bg-[#20262b] p-4 rounded text-center opacity-40 text-sm">Waiting for selections...</div>
        </div>

        <div id="history-info" class="tab-content hidden">
            <div class="bg-[#20262b] p-3 rounded flex justify-between text-xs mb-2">
                <span class="text-green-500">3***7</span>
                <span>Bet <span id="hist-bet-val">2</span></span>
                <span class="text-yellow-500">Waiting</span>
            </div>
        </div>

        <div id="results-info" class="tab-content hidden text-center">
            <p class="text-xs opacity-50 mb-4">LATEST ROUND RESULTS</p>
            <div id="prev-results" class="grid grid-cols-10 gap-2"></div>
        </div>

        <div id="stats-info" class="tab-content hidden">
            <div class="stat-row"><span>1</span><div class="stat-bar" style="width: 60%"></div><span>24</span></div>
            <div class="stat-row"><span>2</span><div class="stat-bar" style="width: 45%"></div><span>18</span></div>
            <div class="stat-row"><span>3</span><div class="stat-bar" style="width: 80%"></div><span>34</span></div>
        </div>
    </div>

    <div id="draw-container" class="hidden text-center p-6">
        <div class="draw-ball-main" id="current-ball">--</div>
        <div id="draw-history" class="grid grid-cols-10 gap-2"></div>
        <div class="mt-20 opacity-30">
            <div class="text-green-500 text-4xl mb-2">✔</div>
            <h2 class="text-xl font-bold">FAIRNESS</h2>
            <p class="text-[8px] tracking-[4px] uppercase">Atlas-V Gaming</p>
        </div>
    </div>

    <script>
        let bet = 2;
        let timerVal = 60;
        const grid = document.getElementById('keno-grid');
        const betLabel = document.getElementById('display-bet');

        // Setup Grid with Hot/Cold spots
        for(let i=1; i<=80; i++) {
            const cell = document.createElement('div');
            cell.className = 'num-cell';
            cell.innerText = i;
            if([3, 11, 30, 53].includes(i)) cell.classList.add('hot');
            if([5, 10, 23, 78].includes(i)) cell.classList.add('cold');
            cell.onclick = () => cell.classList.toggle('selected');
            grid.appendChild(cell);
        }

        // Betting Logic (Max 1000)
        function updateBet(type) {
            if(type === 'x2') bet *= 2;
            else if(type === 'max') bet = 1000;
            else bet += type;
            
            if(bet < 2) bet = 2;
            if(bet > 1000) bet = 1000;
            betLabel.innerText = bet;
            document.getElementById('hist-bet-val').innerText = bet;
        }

        // Tab Navigation
        function switchTab(e, id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            e.currentTarget.classList.add('active');
        }

        // Slow Draw & Reset
        function triggerDraw() {
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('draw-container').classList.remove('hidden');
            let count = 0;
            const drawInterval = setInterval(() => {
                const num = Math.floor(Math.random() * 80) + 1;
                document.getElementById('current-ball').innerText = num;
                const b = document.createElement('div');
                b.className = 'small-ball'; b.innerText = num;
                document.getElementById('draw-history').appendChild(b);
                count++;
                if(count >= 20) {
                    clearInterval(drawInterval);
                    setTimeout(() => location.reload(), 7000); // Return to game
                }
            }, 900); // Slower draw speed
        }

        const clock = setInterval(() => {
            timerVal--;
            document.getElementById('timer').innerText = `00:${timerVal < 10 ? '0'+timerVal : timerVal}`;
            if(timerVal <= 0) { clearInterval(clock); triggerDraw(); }
        }, 1000);
    </script>
</body>
</html>
